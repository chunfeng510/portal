<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <style>
    /* ── Reset & Variables ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-from: #1a1a2e;
      --bg-to:   #16213e;
      --accent:  #e94560;
      --card-bg:       rgba(255, 255, 255, 0.06);
      --card-bg-hover: rgba(255, 255, 255, 0.12);
      --card-border:   rgba(255, 255, 255, 0.12);
      --text-primary:   #f1f5f9;
      --text-secondary: rgba(241, 245, 249, 0.6);
      --pill-bg:       rgba(255, 255, 255, 0.08);
      --pill-active-bg: rgba(255, 255, 255, 0.2);
      --search-bg:     rgba(255, 255, 255, 0.08);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    /* ── Body ──────────────────────────────────────────────────── */
    body {
      min-height: 100vh;
      background: linear-gradient(160deg, var(--bg-from) 0%, var(--bg-to) 100%);
      color: var(--text-primary);
      font-family: 'Noto Sans TC', 'Inter', sans-serif;
      padding: 0 16px 60px;
    }

    /* ── Container ─────────────────────────────────────────────── */
    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    /* ── Profile ───────────────────────────────────────────────── */
    .profile {
      text-align: center;
      padding: 56px 20px 32px;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      margin: 0 auto 20px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .profile-name {
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 10px;
    }

    .profile-tagline {
      font-size: 1rem;
      color: var(--text-secondary);
      font-weight: 300;
    }

    /* ── Search ────────────────────────────────────────────────── */
    .search-wrapper {
      max-width: 420px;
      margin: 28px auto 0;
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      pointer-events: none;
      opacity: 0.5;
    }

    .search-input {
      width: 100%;
      padding: 12px 20px 12px 44px;
      background: var(--search-bg);
      border: 1px solid var(--card-border);
      border-radius: 50px;
      color: var(--text-primary);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      backdrop-filter: blur(10px);
      transition: background 0.25s, border-color 0.25s;
    }

    .search-input::placeholder { color: var(--text-secondary); }

    .search-input:focus {
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.35);
    }

    /* ── Category Pills ────────────────────────────────────────── */
    .categories {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin: 24px 0 28px;
    }

    .pill {
      padding: 6px 18px;
      border-radius: 50px;
      border: 1px solid var(--card-border);
      background: var(--pill-bg);
      color: var(--text-secondary);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s ease;
      user-select: none;
      font-family: inherit;
    }

    .pill:hover { background: var(--pill-active-bg); color: var(--text-primary); }

    .pill.active {
      background: var(--pill-active-bg);
      color: var(--text-primary);
      border-color: rgba(255, 255, 255, 0.4);
      font-weight: 500;
    }

    /* ── Links Grid ────────────────────────────────────────────── */
    .links-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    @media (max-width: 720px) {
      .links-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 440px) {
      .links-grid { grid-template-columns: 1fr; }
    }

    /* ── Card ──────────────────────────────────────────────────── */
    .card {
      display: flex;
      flex-direction: column;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 22px 20px 20px;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      backdrop-filter: blur(12px);
      transition: transform 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
      border-left: 4px solid transparent;
      animation: fadeUp 0.35s ease both;
    }

    .card:hover {
      background: var(--card-bg-hover);
      transform: translateY(-5px);
      box-shadow: var(--shadow);
    }

    .card:active { transform: translateY(-2px); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-emoji {
      font-size: 2.2rem;
      margin-bottom: 14px;
      line-height: 1;
    }

    .card-title {
      font-size: 0.98rem;
      font-weight: 600;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .card-description {
      font-size: 0.82rem;
      color: var(--text-secondary);
      line-height: 1.6;
      flex: 1;
    }

    .card-arrow {
      margin-top: 14px;
      font-size: 0.78rem;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .card:hover .card-arrow { opacity: 1; }

    /* ── No Results ────────────────────────────────────────────── */
    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
      font-size: 1rem;
    }

    /* ── Footer ────────────────────────────────────────────────── */
    .footer {
      text-align: center;
      margin-top: 48px;
      color: rgba(255, 255, 255, 0.25);
      font-size: 0.78rem;
    }

    /* ── Count badge ───────────────────────────────────────────── */
    .count {
      text-align: center;
      margin-bottom: 20px;
      font-size: 0.82rem;
      color: var(--text-secondary);
    }

    /* ── Typewriter cursor ─────────────────────────────────────── */
    .tw-cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--text-secondary);
      margin-left: 2px;
      vertical-align: text-bottom;
      border-radius: 1px;
      animation: cursorBlink 0.85s step-end infinite;
    }

    @keyframes cursorBlink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Profile -->
    <div class="profile">
      <div class="avatar" id="profileAvatar"></div>
      <h1 class="profile-name" id="profileName"></h1>
      <p class="profile-tagline">
        <span id="typewriterText"></span><span class="tw-cursor"></span>
      </p>

      <!-- Search -->
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input
          id="searchInput"
          type="text"
          class="search-input"
          placeholder="搜尋網站名稱或描述..."
          autocomplete="off"
        />
      </div>
    </div>

    <!-- Category Pills -->
    <div class="categories" id="categories"></div>

    <!-- Count -->
    <p class="count" id="countBadge"></p>

    <!-- Links Grid -->
    <div class="links-grid" id="linksGrid"></div>

    <!-- Footer -->
    <div class="footer">
      <p id="footerText"></p>
    </div>

  </div>

  <script src="config.js"></script>
  <script>
    // ── State ──────────────────────────────────────────────────────────
    let activeCategory = "全部";
    let searchQuery = "";

    // ── Init Profile ───────────────────────────────────────────────────
    (function initProfile() {
      const { avatar, name, tagline } = siteConfig.profile;
      const avatarEl = document.getElementById("profileAvatar");

      // Support both emoji text and image URL
      if (avatar.startsWith("http") || avatar.startsWith("/") || avatar.startsWith("./")) {
        const img = document.createElement("img");
        img.src = avatar;
        img.alt = name;
        avatarEl.appendChild(img);
      } else {
        avatarEl.textContent = avatar;
      }

      document.getElementById("profileName").textContent = name;
      document.title = name;
      document.getElementById("footerText").textContent = `© ${new Date().getFullYear()} ${name}`;
    })();

    // ── Typewriter ──────────────────────────────────────────────────────
    (function initTypewriter() {
      const { tagline, taglines } = siteConfig.profile;
      const phrases = taglines && taglines.length ? taglines : [tagline || ""];
      const el = document.getElementById("typewriterText");

      const TYPING_MS  = 75;   // 每個字的打字速度
      const DELETE_MS  = 35;   // 刪字速度
      const PAUSE_END  = 2200; // 打完後停頓
      const PAUSE_DEL  = 450;  // 刪完後停頓

      let idx        = 0;
      let charIdx    = 0;
      let isDeleting = false;

      function tick() {
        const phrase = phrases[idx];

        if (!isDeleting) {
          charIdx++;
          el.textContent = phrase.slice(0, charIdx);
          if (charIdx === phrase.length) {
            if (phrases.length === 1) return; // 只有一句，不循環
            isDeleting = true;
            setTimeout(tick, PAUSE_END);
          } else {
            setTimeout(tick, TYPING_MS);
          }
        } else {
          charIdx--;
          el.textContent = phrase.slice(0, charIdx);
          if (charIdx === 0) {
            isDeleting = false;
            idx = (idx + 1) % phrases.length;
            setTimeout(tick, PAUSE_DEL);
          } else {
            setTimeout(tick, DELETE_MS);
          }
        }
      }

      setTimeout(tick, 700); // 頁面載入後稍微延遲再開始
    })();

    // ── Init Category Pills ────────────────────────────────────────────
    (function initCategories() {
      const container = document.getElementById("categories");
      siteConfig.categories.forEach((cat) => {
        const btn = document.createElement("button");
        btn.className = "pill" + (cat === activeCategory ? " active" : "");
        btn.textContent = cat;
        btn.addEventListener("click", () => {
          activeCategory = cat;
          document.querySelectorAll(".pill").forEach((p) => p.classList.remove("active"));
          btn.classList.add("active");
          render();
        });
        container.appendChild(btn);
      });
    })();

    // ── Render ─────────────────────────────────────────────────────────
    function render() {
      const grid = document.getElementById("linksGrid");
      const count = document.getElementById("countBadge");

      const q = searchQuery.trim().toLowerCase();

      const filtered = siteConfig.links.filter((link) => {
        const matchCat = activeCategory === "全部" || link.category === activeCategory;
        const matchQ =
          !q ||
          link.title.toLowerCase().includes(q) ||
          link.description.toLowerCase().includes(q);
        return matchCat && matchQ;
      });

      count.textContent = filtered.length > 0
        ? `共 ${filtered.length} 個網站`
        : "";

      if (filtered.length === 0) {
        grid.innerHTML = '<div class="no-results">😅 找不到符合的網站</div>';
        return;
      }

      grid.innerHTML = filtered
        .map(
          (link, i) => `
          <a
            class="card"
            href="${link.url}"
            target="_blank"
            rel="noopener noreferrer"
            style="border-left-color:${link.color}; animation-delay:${i * 40}ms"
            title="${link.title}"
          >
            <div class="card-emoji">${link.emoji}</div>
            <div class="card-title">${link.title}</div>
            <div class="card-description">${link.description}</div>
            <div class="card-arrow">前往網站 →</div>
          </a>`
        )
        .join("");
    }

    // ── Search ─────────────────────────────────────────────────────────
    document.getElementById("searchInput").addEventListener("input", (e) => {
      searchQuery = e.target.value;
      render();
    });

    // ── Initial render ──────────────────────────────────────────────────
    render();
  </script>
</body>
</html>
